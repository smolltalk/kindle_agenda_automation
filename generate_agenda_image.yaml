name: Generate Agenda Image

on:
  schedule:
    - cron: '0 5 * * *'   # tous les jours à 07:00 (heure FR approx)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth pillow

      - name: Add credentials
        run: echo '${{ secrets.GCAL_CREDENTIALS }}' > credentials.json

      - name: Run script
        run: python generate_agenda_image.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agenda
          path: agenda.png